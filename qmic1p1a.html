//--------------------------------------------------------------------
// micrometer
//--------------------------------------------------------------------
function micrometer(r, n, s, o, z)
{ // 半径,倍率,0or1,LorR
  let x0, y0, x1, y1, x2, y2, x3, y3, x4, y4, x, y;
  let t0, t, a, b, e, f, i, k, ar;

  ar  = Q.area(n + 8);
  x0 = ar[0] + ar[2] / 2;
  y0 = ar[1] + ar[3] / 2;
  B.WINDOW( x0, y0, x0-639, y0-399);

  x1  = r * 0.06;
  y1  = r * 0.06;
  if (n)
  {
    t  = Q.getd(n);
    t0 = Q.rad(t);
    a  = Math.cos(t0);
    b  = Math.sin(t0);
    x  =  Q.getx(n);
    y  = -Q.gety(n);

    k  = x1 * z / 2;
    B.ELLIPSE(x, y, k, C4, 0.5, t0);
  }
  else
  {
    x4 = x1 * s / o;
    y4 = y1 * s / o;
    t  = Q.getd(n);
    t0 = Q.rad(t);
    a  = Math.cos(t0);
    b  = Math.sin(t0);
    e  = Q.getx(n);
    f  = Q.gety(n);
    k  = Math.round(24 * (o/s) / 2);
    for (i = 0; i <= k*2; i++)
    {
      if      ((i % 10) == 0) y = y4 * 2;
      else if ((i %  5) == 0) y = y4 * 1.5;
      else                    y = y4;
    
      x = -(i-k) * x4;
      x2 = x * a - (-y) * b + e;
      y2 = x * b + (-y) * a - f;
      x3 = x * a -   y  * b + e;
      y3 = x * b +   y  * a - f;
      B.LINE(x2, y2, x3, y3, C5);
    }
  }

  for (i = 5; i <= 35; i++)
  {
    if      ((i % 10) == 0) y = y1 * 3;
    else if ((i %  5) == 0) y = y1 * 2;
    else                    y = y1;
    x = x1 * (i - 20);
    B.LINE(x, y, x, -y, C7);
  }

  B.CIRCLE(0, 0, r, C7);

  B.WINDOW(0, 0, 639, 399);
}

//--------------------------------------------------------------------
// select
//--------------------------------------------------------------------
function select(n, c1, c0)
{
  let rect, x, y, w, h;

  rect = Q.area(n);
  x = rect[0];
  y = rect[1];
  w = rect[2];
  h = rect[3];
  B.LINEBF(x, y, x+w, y+h, c0);
  B.LINEB (x, y, x+w, y+h, c1);
}

function dispans1(i, a, b)
{
  let s;

  B.TAB(   0.5, -0.5); B.PRINTe(a);
  s = "".padEnd(i+1, '_');
  B.TAB(-i-0.5,  0  ); B.PRINT (s);
  B.TAB(-i-0.5,  1.0); B.PRINTe(b);
  B.TAB(   0  , -0.5);
}

function dispans(x, y, s, ans)
{
  let a, b, w, h, i, n, f;

  w = 8;
  h = 9;
  B.LOCATEp(x+w, y+h); B.PRINT(s + ": ");
  f = 1;
  n = ans.length;
  for (i = 0; i < n;)
  {
    if (f)
    {
      B.PRINTe(ans[i++]); f = 0; continue;
    }
    dispans1(ans[i], ans[i+1], ans[i+2]); i += 3; f = 1;
  }
}

function answer(quiz, n)
{
  let r;

  select(0, C7, (n == 1)? C3 : C1);
  select(1, C7, (n == 2)? C3 : C1);
  select(2, C7, (n == 3)? C3 : C1);
  select(3, C7, (n == 4)? C3 : C1);
  r = Q.area(0); dispans(r[0], r[1], "A", quiz[1]);
  r = Q.area(1); dispans(r[0], r[1], "B", quiz[2]);
  r = Q.area(2); dispans(r[0], r[1], "C", quiz[3]);
  r = Q.area(3); dispans(r[0], r[1], "D", quiz[4]);
}

//--------------------------------------------------------------------
// question
//--------------------------------------------------------------------
function dispque(ans)
{
  let a, b, w, h, i, n, f;

  f = 1;
  n = ans.length;
  for (i = 0; i < n;)
  {
    if (f)
    {
      B.PRINTe(ans[i++]); f = 0; continue;
    }
    dispans1(ans[i], ans[i+1], ans[i+2]); i += 3; f = 1;
  }
}

//--------------------------------------------------------------------
// yes no
//--------------------------------------------------------------------
function yesno(n, s)
{
  let r, i1, i2;

  i1 = 4 + s * 2;
  i2 = i1 + 1;
  select(i1, C7, (n == 1)? C3 : C1);
  select(i2, C7, (n == 2)? C3 : C1);
  r = Q.area(i1); dispans(r[0], r[1], "Y", ["Yes."]);
  r = Q.area(i2); dispans(r[0], r[1], "N", ["No." ]);
}

  Q.yesno(0);
  q = Q.question(Q.level(-1), count, Quiz0)

}

//  if (Q.level(-1) >= 3)

  a = Q.level(-1)*1000 + n*100 + Q.number(-1);

  B.TAB(1, 0); dispque(q[0]); B.CR();

  a = Q.answer(-1);

  n = 0;
  if (a > 0)
  {
    m = Q.state(-1);
    if (m < 2)
    {
      n = Q.yesno(-1) - m * 2;
      if (n > 2) n = 0;
      yesno(n, m);
    }
    B.LOCATE(0, 19);
    B.TAB(1, 0); B.PRINT (s[a-1] + "でファイナルアンサー? ");
    if (n == 1 || m > 0)
    {
      if (a == q[5])
      {
        if (m == 1)
        {
          if (Q.count(-1) < QuizN)
          {
            switch(n)
            {
              case 1: next(Q.count(-1) + 1); return;
              case 2: next(Q.count(-1)    ); return;
            }
          }
          else
          {
            if (n > 0) { next(1); return; }
          }
        }
        B.TAB(1, 0); B.PRINT ("正解!");
        if (Q.count(-1) < QuizN)
        {
          B.PRINT ("  次の問題に進みますか?");
          Q.state(1);
        }
        else
        {
          if (m < 2) Q.count(Q.count(-1)+1);
          B.PRINT("  おめでとうございます!!");
          B.CR(); B.CR();
          B.TAB(1, 0); B.PRINT("もう一度挑戦するときは");
                       B.PRINT("ResetかLevelボタンを押して下さい");
          B.CR();
          Q.state(2);
        }
        Q.yesno(0);
        if (n > 0) window.requestAnimationFrame(display);
        return;
      }
      else
      {
        B.TAB(1, 0); B.PRINT ("残念!  " + s[q[5]-1] + " でした");
        B.CR(); B.CR();
        B.TAB(1, 0); B.PRINT("もう一度挑戦するときは");
        B.TAB(1, 0); B.PRINT("ResetかLevelボタンを押して下さい");
        B.CR();
        Q.state(2);
        Q.yesno(0);
        if (n > 0) window.requestAnimationFrame(display);
        return;
      }
    }
  }

//  B.LOCATE(1, 0); B.COLOR('#fff'); B.PRINT(Temp); B.CR();

  Q.yesno(0);
  if (n == 2)
  {
    Q.answer(0);
    window.requestAnimationFrame(display);
  }
}

function pushinit()
{
  let v, i;

  v = document.getElementById("target");
  for (i = 0; i < v.length; i++)
  {
    v[i].checked = false;
  }
  v[v.length-1].checked = true;
}

function pushget()
{
  let v, i;

  v = document.getElementById("target");
  for (i = 0; i < v.length; i++)
  {
    if (v[i].checked) { Q.level(5 - i); break; }
  }
  window.requestAnimationFrame(display);
}

function reset()
{
  pushget();
  next(1);

function pushlvl()
{
  let v, i;

  v = document.getElementById("target");
  for (i = 0; i < v.length; i++)
  {
    if (v[i].checked) { Q.level(5 - i); break; }
  }
  Q.count(1);
  reset();
}

document.getElementById("target"  ).addEventListener('input', pushlvl);

function keylvl(x)
{
  let v, i;

  v = document.getElementById("target");
  for (i = 0; i < v.length; i++)
  {
    v[i].checked = (i == x)? true : false;
  }
  pushlvl();
  reset();
}

//--------------------------------------------------------------------
// Input key
//--------------------------------------------------------------------
function keyon(key)
{
  let d, s, n, x, y;

  // SHIFT16 CTRL17 ALT18
  if      (Key[ 17]) { s =  5; n = 0; }
  else if (Key[ 16]) { s =  1; n = 0; }
  else               { s =  1; n = 1; }

  x = Q.getx(n);
  y = Q.gety(n);
  if      (Key[ 38] || key == 38) //↑
  {
    d = Q.getd(0);
    if (s < 5) { y += s; Q.sety(y, n); } else { d += s; Q.setd(d, 0); }
    return 1;    
  }
  else if (Key[ 40] || key == 40) //↓
  {
    d = Q.getd(0);
    if (s < 5) { y -= s; Q.sety(y, n); } else { d -= s; Q.setd(d, 0); }
    return 1;
  }
  else if (Key[ 39] || key == 39) //→
  {
    d = Q.getd(1);
    if (s < 5) { x += s; Q.setx(x, n); } else { d -= s; Q.setd(d, 1); }
    return 1;
  } 
  else if (Key[ 37] || key == 37) //←
  {
    d = Q.getd(1);
    if (s < 5) { x -= s; Q.setx(x, n); } else { d += s; Q.setd(d, 1); }
    return 1;
  }
  return 0;
}

function inkey(key)
{
  switch (key)
  {
    case  13: Q.setd(0, 0); Q.setd(0, 1); key = 0; break; // Enter
    case  32: reset(); key = 0; break; // ' '
    case  81: B.lineWidth( 0.5); key = 0; break; // 'Q'
    case  87: B.lineWidth( 2  ); key = 0; break; // 'W'
    case  90: B.zooming  (-1  ); key = 0; break; // 'Z'
    case  88: B.zooming  ( 1  ); key = 0; break; // 'X'
    case  86: B.zooming  ( 0  ); key = 0; break; // 'V'
    case  53: keylvl(0)  ; key = 0; break; // '5'
    case  52: keylvl(1)  ; key = 0; break; // '4'
    case  51: keylvl(2)  ; key = 0; break; // '3'
    case  50: keylvl(3)  ; key = 0; break; // '2'
    case  49: keylvl(4)  ; key = 0; break; // '1'
    case  65: Q.answer(1); key = 0; break; // 'a'
    case  66: Q.answer(2); key = 0; break; // 'b'
    case  67: Q.answer(3); key = 0; break; // 'c'
    case  68: Q.answer(4); key = 0; break; // 'd'
    case  89: Q.yesno(1) ; key = 0; break; // 'y'
    case  78: Q.yesno(2) ; key = 0; break; // 'n'
    default : if (keyon(key))    key = 0;
  }
  if (key) return;
  blur();
  window.requestAnimationFrame(display);
}
document.body.addEventListener('keydown', event =>
{
  let key = event.keyCode;

  inkey(key);
});

//--------------------------------------------------------------------
// Key status
//--------------------------------------------------------------------
let Key = new Array(256);
for (let i = 0; i < 256; i++) Key[i] = 0;
window.onkeydown = function(event) { Key[event.keyCode] = 1; }
window.onkeyup   = function(event) { Key[event.keyCode] = 0; }

//----------------------------------------------------------------------
// mouse
//----------------------------------------------------------------------
function mouseDn(x, y, touch)
{
  let x1, y1, d, d1, d2, i;

  if (!(0 <= x && x <= canvas.width )) return 0;
  if (!(0 <= y && y <= canvas.height)) return 0;

  x1 = B.winX(x);
  y1 = B.winY(y);

  d1 = -1;
  for (i = 0; i < Q.area(-1); i++)
  {
    d = Q.area(i);
    if ((d[0] <= x1 && x1 < d[0] + d[2])
     && (d[1] <= y1 && y1 < d[1] + d[3]))
    {
      if      (i < 4) { if (Q.state(-1) == 0) Q.answer(i     + 1); }
      else if (i < 8) {                       Q.yesno (i - 4 + 1); }
      else            { d1 = i - 8; break; }
      blur();
      window.requestAnimationFrame(display);
      return 0;
    }
  }
  if (d1 < 0) return 0;

  i   = d1;
  x1  = x1 - (d[0] + d[2] / 2);
  y1  = (d[1] + d[3] / 2) - y1;
  d1  = Math.sqrt(x1*x1+y1*y1);
  if (d1 < d[2]/3)
  {
    d1 = x1 - Q.getx(i);
    d2 = y1 - Q.gety(i);
    M.ofsX(d1);
    M.ofsY(d2);
    M.ofsZ(i+2);
  }
  else
  {
    d1  = Math.atan2(y1, x1);
    d1  = Q.deg(d1);
    d1 -= Q.getd(i);
    M.ofsX(d1);
    M.ofsZ(i );
  }
  blur();
  return 1;
}

function mouseMv(x, y, touch)
{
  let x1, y1, d, d1, d2, i;

  i  = M.ofsZ('');
  if (i >= 2)
  {
    i -= 2;
    d1 = M.ofsX('');
    d2 = M.ofsY('');
    d  = Q.area(i + 8);
    x1 = B.winX(x);
    y1 = B.winY(y);
    x1 = x1 - (d[0] + d[2] / 2);
    y1 = (d[1] + d[3] / 2) - y1;
    x1 -= d1;
    y1 -= d2;
    d1 = 1;
    x1 = Math.round(x1 / d1) * d1;
    y1 = Math.round(y1 / d1) * d1;
    Q.setx(x1, i);
    Q.sety(y1, i);
  }
  else
  {
    d1 = M.ofsX('');
    d  = Q.area(i + 8);
    x1 = B.winX(x);
    y1 = B.winY(y);
    x1  = x1 - (d[0] + d[2] / 2);
    y1  = (d[1] + d[3] / 2) - y1;

    d  = Math.atan2(y1, x1);
    d  = Q.deg(d);
    d -= d1;
    d1 = 5;
    d  = Math.round(d / d1) * d1;
    Q.setd(d, i);
  }
  blur();
  window.requestAnimationFrame(display);
}

const M = new MOUSE();
M.add();
M.mosDnFunc(mouseDn);
M.mosMvFunc(mouseMv);

//--------------------------------------------------------------------
// main
//--------------------------------------------------------------------
function main()
{
  display();
}
init();

//--------------------------------------------------------------------
</script>
